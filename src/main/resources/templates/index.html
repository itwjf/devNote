<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>DevNote 博客</title>
    <!-- 先加载 Bootstrap 样式 -->
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <!-- 再加载你的自定义样式（可覆盖默认样式） -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <!-- 顶部导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
        <div class="container">
            <!-- Logo -->
            <a class="navbar-brand fw-bold text-primary fs-4" th:href="@{/}">DevNote</a>

            <!-- 用户菜单（右侧） -->
            <div class="d-flex align-items-center" sec:authorize="isAuthenticated()">
                <!-- 头像占位（未来可替换为真实头像） -->
                <div class="dropdown">
                    <a class="d-flex align-items-center text-decoration-none dropdown-toggle"
                       href="#" role="button" data-bs-toggle="dropdown">
                        <!-- 动态头像：优先用 currentUser.avatar，否则用默认图 -->
                        <img th:src="${currentUser?.avatar ?: '/images/default-avatar.png'}"
                             class="rounded-circle me-2"
                             width="32"
                             height="32"
                             alt="头像">

                        <span th:text="${#authentication.name}" class="text-dark"></span>
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item"
                               th:href="@{'/user/' + ${#authentication.name}}">
                                个人主页
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <a class="dropdown-item" th:href="@{/posts/new}">
                                ✍️ 写新文章
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="d-grid">
                                <button type="submit" class="dropdown-item text-danger">
                                    🔒 退出登录
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- 未登录时 -->
            <div sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}" class="btn btn-outline-primary btn-sm me-2">登录</a>
                <a th:href="@{/register}" class="btn btn-primary btn-sm">注册</a>
            </div>
        </div>
    </nav>

    <div th:if="${message}" class="alert alert-success" role="alert">
        <span th:text="${message}"></span>
    </div>

    <!-- ✅ 文章列表 -->
    <div th:if="${posts}" th:each="post : ${posts}" class="card mb-3 shadow-sm">
        <div class="card-body">
<!--            标题 ：点击标题跳转至文章详情页面-->
            <h5 class="card-title">
                <a th:href="@{/posts/{id}(id=${post.id})}"
                   th:text="${post.title}"
                   class="text-decoration-none text-dark"></a>
            </h5>

            <p th:text="${#strings.abbreviate(post.content, 100)}" class="card-text text-muted"></p>

            <div class="d-flex justify-content-between text-secondary small">
<!--                跳转显示用户主页-->
                <p>
                    作者：
                    <a th:href="@{'/user/' + ${post.author.username}}" class="author-link"
                       th:text="${post.author.username}"></a>
                </p>

<!--                显示文章创建时间-->
                <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
            </div>
        </div>
    </div>

    <!-- 没有文章时的提示 -->
    <div th:if="${#lists.isEmpty(posts)}" class="alert alert-info">
        暂无文章，快去 <a href="/posts/new">写一篇</a> 吧！
    </div>
</div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

</script>
</body>
</html>
