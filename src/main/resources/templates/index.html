<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DevNote 博客</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 先加载 Bootstrap 样式（本地文件） -->
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <!-- 加载 Bootstrap Icons（使用CDN，本地没有此文件） -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- 再加载你的自定义样式（本地文件） -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <!-- 引入导航栏片段 -->
    <div th:replace="~{fragments/navbar :: nav}"></div>
    
    <!-- 简单的内容，先测试基础功能 -->
    <h1>欢迎来到 DevNote</h1>
    <p>这是一个简化版本的首页，用于测试模板解析。</p>
    
    <!-- 简单的变量显示，测试Thymeleaf表达式 -->
    <p th:if="${currentUsername}">当前登录用户: <span th:text="${currentUsername}"></span></p>
    <p th:unless="${currentUsername}">您尚未登录</p>
    
    <!-- 测试文章列表 -->
    <h2>最新文章</h2>
    
    <!-- 文章列表 -->
    <div class="container mt-4">
        <div th:if="${not posts.empty}">
            <div class="row">
                <div class="col-12" th:each="post : ${posts}">
                    <div class="card mb-4">
                        <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h2 class="card-title mb-0"><a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}"></a></h2>
                        <div>
                            <span th:if="${post.visibility == 'PUBLIC'}" class="badge bg-primary">公开</span>
                            <span th:if="${post.visibility == 'FOLLOWERS'}" class="badge bg-info">粉丝可见</span>
                            <span th:if="${post.visibility == 'PRIVATE'}" class="badge bg-secondary">私密</span>
                        </div>
                    </div>
                    <p class="card-text" th:text="${post.content}"></p>
                </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:unless="${not posts.empty}" class="alert alert-info">
            暂无文章
        </div>
    </div>
    <div th:if="${posts}">
        <p>共有 <span th:text="${posts.size()}"></span> 篇文章</p>
    </div>
    <div th:unless="${posts} and not posts.empty">
        <p>暂无文章</p>
    </div>
</div>
    
    <!-- 加载 Bootstrap JavaScript（本地文件） -->
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    
    <!-- 如果有自定义脚本，可以放在这里 -->
    <!-- <script th:src="@{/js/main.js}"></script> -->
</body>
</html>
